# Fit-analysis calibration scenarios.
# Each entry defines a schedule, expected score range, and why.
#
# Run: python calibrate.py
# Run single: python calibrate.py --filter "cse120_math103b_mgt128r"
#
# Fields:
#   id          - unique slug for filtering
#   label       - human-readable name
#   expected    - [min, max] fitness_score range (inclusive, tolerance ±0.5 applied at runtime)
#   why         - reason the range was chosen (for future reference)
#   courses     - list of courses with rmp, meetings, logistics

scenarios:
