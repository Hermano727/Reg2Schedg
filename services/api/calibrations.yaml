    label: "CSE 120 + MATH 103B + MGT 128R (2 hard + 1 easy)"
    expected: [5.5, 7.5]
    why: >
      avg_rmp 3.73 falls in moderate bucket but 2 hard-outlier courses (CSE 120 RMP 4.3,
      MATH 103B RMP 4.1) anchor difficulty. User-reported actual: 5.5. Target: 6.5.
    courses:
      - code: CSE 120
        professor: Voelker
        rmp_difficulty: 4.3
        attendance: false
        textbook: true
        podcasts: true
